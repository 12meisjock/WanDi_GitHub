<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        // 默认群号
        const DEFAULT_GROUP_ID = '827813247';
        
        // 从路径提取数字 (如 /myrepo/123456 或 /123456)
        const path = window.location.pathname;
        const match = path.match(/\/(\d+)(?:\/|$)/);
        const groupId = match ? match[1] : DEFAULT_GROUP_ID;
        
        // 构建跳转链接
        const targetUrl = `https://ti.qq.com/new_open_qq/index.html?appid=64&url=mqqapi%3A%2F%2Fgroup%2Fjoin_troop%3Fsrc_type%3Dinternal%26version%3D1%26troop_uin%3D${groupId}%26subsource_id%3D1030%26is_need_jump_aio%3D1`;
        
        // 立即跳转
        window.location.replace(targetUrl);
    </script>
</head>
<body>
    <p>Redirecting to QQ group...</p>
</body>
</html>
