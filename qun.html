<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跳转中...</title>
    
    <!-- 方式1: HTTP 301 永久重定向 (通过 meta 标签模拟) -->
    <meta http-equiv="refresh" content="0; url=https://ti.qq.com/new_open_qq/index.html?appid=64&url=mqqapi%3A%2F%2Fgroup%2Fjoin_troop%3Fsrc_type%3Dinternal%26version%3D1%26troop_uin%3D827813247%26subsource_id%3D1030%26is_need_jump_aio%3D1">
    
    <!-- 方式2: Canonical 标签 -->
    <link rel="canonical" href="https://ti.qq.com/new_open_qq/index.html?appid=64&url=mqqapi%3A%2F%2Fgroup%2Fjoin_troop%3Fsrc_type%3Dinternal%26version%3D1%26troop_uin%3D827813247%26subsource_id%3D1030%26is_need_jump_aio%3D1">
    
    <script>
        // 方式3: JavaScript 立即重定向
        window.location.replace("https://ti.qq.com/new_open_qq/index.html?appid=64&url=mqqapi%3A%2F%2Fgroup%2Fjoin_troop%3Fsrc_type%3Dinternal%26version%3D1%26troop_uin%3D827813247%26subsource_id%3D1030%26is_need_jump_aio%3D1");
        
        // 备用方案: 如果上面失败，使用 location.href
        if (!window.location.href.includes("ti.qq.com")) {
            window.location.href = "https://ti.qq.com/new_open_qq/index.html?appid=64&url=mqqapi%3A%2F%2Fgroup%2Fjoin_troop%3Fsrc_type%3Dinternal%26version%3D1%26troop_uin%3D827813247%26subsource_id%3D1030%26is_need_jump_aio%3D1";
        }
    </script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
        }
        。container {
            padding: 20px;
        }
        。spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        a {
            color: #ffd700;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>正在跳转...</h2>
        <p>如果没有自动跳转，请 <a href="https://ti.qq.com/new_open_qq/index.html?appid=64&url=mqqapi%3A%2F%2Fgroup%2Fjoin_troop%3Fsrc_type%3Dinternal%26version%3D1%26troop_uin%3D827813247%26subsource_id%3D1030%26is_need_jump_aio%3D1">点击这里</a></p>
    </div>
    
    <script>
        // 再次尝试，确保重定向执行
        setTimeout(function() {
            if (!window.location.href.includes("ti.qq.com")) {
                window.location.replace("https://ti.qq.com/new_open_qq/index.html?appid=64&url=mqqapi%3A%2F%2Fgroup%2Fjoin_troop%3Fsrc_type%3Dinternal%26version%3D1%26troop_uin%3D827813247%26subsource_id%3D1030%26is_need_jump_aio%3D1");
            }
        }, 100);
    </script>
</body>
</html>
